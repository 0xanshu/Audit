name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/audit_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/audit_test
      AUTH_SECRET: ci-secret-not-real
      AUTH_GITHUB_ID: ci-github-id
      AUTH_GITHUB_SECRET: ci-github-secret
      SKIP_ENV_VALIDATION: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Run tests
        run: bunx vitest run
